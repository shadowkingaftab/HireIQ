services:
  - type: web
    name: proofhire-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: proofhire-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false
